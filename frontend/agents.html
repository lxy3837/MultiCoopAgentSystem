<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Agent管理 - MCASys</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 3D粒子背景 -->
    <canvas id="starCanvas"></canvas>
    <div class="saturn-container">
        <div class="core-3d-container">
            <canvas id="saturnCoreCanvas"></canvas>
        </div>
        <div class="ring-3d-container">
            <canvas id="saturnRingCanvas"></canvas>
        </div>
    </div>
    
    <!-- 主容器 -->
    <div class="app-container">
        <!-- 侧边导航栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-robot"></i>
                    <span class="logo-text">MCASys</span>
                </div>
            </div>
            
            <nav class="nav-menu">
                <ul>
                    <li class="nav-item">
                        <a href="index.html" class="nav-link" data-i18n="nav.home">
                            <i class="fas fa-home"></i>
                            <span class="nav-text">首页</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="workbench.html" class="nav-link" data-i18n="nav.workbench">
                            <i class="fas fa-desktop"></i>
                            <span class="nav-text">工作台</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="agents.html" class="nav-link active" data-i18n="nav.agents">
                            <i class="fas fa-users"></i>
                            <span class="nav-text">Agent管理</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="tasks.html" class="nav-link" data-i18n="nav.tasks">
                            <i class="fas fa-tasks"></i>
                            <span class="nav-text">任务管理</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="logs.html" class="nav-link" data-i18n="nav.logs">
                            <i class="fas fa-history"></i>
                            <span class="nav-text">系统日志</span>
                        </a>
                    </li>
                </ul>
            </nav>
            
            <div class="sidebar-footer">
                <div class="system-info">
                    <div class="system-version" data-i18n="system.version">版本: 1.0.0</div>
                    <div class="system-status">
                        <i class="fas fa-circle status-indicator online"></i>
                        <span data-i18n="system.status">在线</span>
                    </div>
                </div>
            </div>
        </aside>
        
        <!-- 主内容区域 -->
        <main class="main-content">
            <!-- 顶部导航栏 -->
            <header class="top-header">
                <div class="header-left">
                    <h1 class="page-title" data-i18n="sections.agentList">Agent列表</h1>
                </div>
                <div class="header-right">
                    <div class="user-info">
                        <i class="fas fa-user-circle"></i>
                        <span class="username" data-i18n="user.admin">管理员</span>
                    </div>
                </div>
            </header>
            
            <!-- 内容区域 -->
            <div class="content-wrapper">
                <!-- Agent列表 -->
                <section class="agents-section">
                    <!-- Agent操作 -->
                    <div class="agents-actions" style="margin-bottom: 1.5rem;">
                        <button class="action-btn action-btn--primary" id="refreshAgents" data-action="refresh">刷新Agent列表</button>
                    </div>
                    
                    <!-- Agent表格 -->
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th data-i18n="agents.columns.id">Agent ID</th>
                                <th data-i18n="agents.columns.type">Agent类型</th>
                                <th data-i18n="agents.columns.status">状态</th>
                                <th data-i18n="agents.columns.created">创建时间</th>
                                <th data-i18n="agents.columns.updated">最后更新</th>
                                <th data-i18n="agents.columns.actions">操作</th>
                            </tr>
                        </thead>
                        <tbody id="agentsTableBody">
                            <!-- Agent数据将通过JavaScript动态填充 -->
                            <tr>
                                <td colspan="6" style="text-align: center; color: rgba(255, 255, 255, 0.6);">加载中...</td>
                            </tr>
                        </tbody>
                    </table>
                </section>
            </div>
        </main>
    </div>

    <!-- JavaScript -->
    <script src="script.js"></script>
</body>
</html>
