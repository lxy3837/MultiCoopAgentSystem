<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">任务管理 - MCASys</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 3D粒子背景 -->
    <canvas id="starCanvas"></canvas>
    <div class="saturn-container">
        <div class="core-3d-container">
            <canvas id="saturnCoreCanvas"></canvas>
        </div>
        <div class="ring-3d-container">
            <canvas id="saturnRingCanvas"></canvas>
        </div>
    </div>
    
    <!-- 主容器 -->
    <div class="app-container">
        <!-- 侧边导航栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-robot"></i>
                    <span class="logo-text">MCASys</span>
                </div>
            </div>
            
            <nav class="nav-menu">
                <ul>
                    <li class="nav-item">
                        <a href="index.html" class="nav-link" data-i18n="nav.home">
                            <i class="fas fa-home"></i>
                            <span class="nav-text">首页</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="agents.html" class="nav-link" data-i18n="nav.agents">
                            <i class="fas fa-users"></i>
                            <span class="nav-text">Agent管理</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="tasks.html" class="nav-link active" data-i18n="nav.tasks">
                            <i class="fas fa-tasks"></i>
                            <span class="nav-text">任务管理</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="logs.html" class="nav-link" data-i18n="nav.logs">
                            <i class="fas fa-history"></i>
                            <span class="nav-text">系统日志</span>
                        </a>
                    </li>
                </ul>
            </nav>
            
            <div class="sidebar-footer">
                <div class="system-info">
                    <div class="system-version" data-i18n="system.version">版本: 1.0.0</div>
                    <div class="system-status">
                        <i class="fas fa-circle status-indicator online"></i>
                        <span data-i18n="system.status">在线</span>
                    </div>
                </div>
            </div>
        </aside>
        
        <!-- 主内容区域 -->
        <main class="main-content">
            <!-- 顶部导航栏 -->
            <header class="top-header">
                <div class="header-left">
                    <h1 class="page-title" data-i18n="sections.taskList">任务列表</h1>
                </div>
                <div class="header-right">
                    <div class="user-info">
                        <i class="fas fa-user-circle"></i>
                        <span class="username" data-i18n="user.admin">管理员</span>
                    </div>
                </div>
            </header>
            
            <!-- 内容区域 -->
            <div class="content-wrapper">
                <!-- 创建新任务 -->
                <section class="create-task-section">
                    <h2 class="section-title" data-i18n="tasks.createSection">创建新任务</h2>
                    <form class="form" id="createTaskForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label" for="taskName" data-i18n="tasks.form.name">任务名称</label>
                                <input type="text" class="form-input" id="taskName" name="name" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="taskType" data-i18n="tasks.form.type">任务类型</label>
                                <input type="text" class="form-input" id="taskType" name="type" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="taskParams" data-i18n="tasks.form.params">任务参数（JSON格式）</label>
                            <textarea class="form-input form-textarea" id="taskParams" name="params" rows="4"></textarea>
                        </div>
                        <button type="submit" class="action-btn action-btn--primary">创建任务</button>
                    </form>
                </section>
                
                <!-- 任务列表 -->
                <section class="tasks-section">
                    <div class="tasks-header">
                        <h2 class="section-title" data-i18n="sections.taskList">任务列表</h2>
                        <div class="tasks-actions" style="display: flex; gap: 1rem; align-items: center;">
                            <div class="filter-group">
                                <label for="statusFilter" data-i18n="tasks.filter.all">状态筛选:</label>
                                <select class="form-select" id="statusFilter">
                                    <option value="">全部状态</option>
                                    <option value="PENDING">待执行</option>
                                    <option value="RUNNING">运行中</option>
                                    <option value="COMPLETED">已完成</option>
                                    <option value="FAILED">失败</option>
                                </select>
                            </div>
                            <button class="action-btn action-btn--primary" id="refreshTasks" data-action="refresh">刷新任务列表</button>
                        </div>
                    </div>
                    
                    <!-- 任务表格 -->
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th data-i18n="tasks.columns.id">任务ID</th>
                                <th data-i18n="tasks.columns.name">任务名称</th>
                                <th data-i18n="tasks.columns.type">任务类型</th>
                                <th data-i18n="tasks.columns.status">状态</th>
                                <th data-i18n="tasks.columns.agent">执行Agent</th>
                                <th data-i18n="tasks.columns.created">创建时间</th>
                                <th data-i18n="tasks.columns.started">开始时间</th>
                                <th data-i18n="tasks.columns.ended">结束时间</th>
                                <th data-i18n="tasks.columns.actions">操作</th>
                            </tr>
                        </thead>
                        <tbody id="tasksTableBody">
                            <!-- 任务数据将通过JavaScript动态填充 -->
                            <tr>
                                <td colspan="9" style="text-align: center; color: rgba(255, 255, 255, 0.6);">加载中...</td>
                            </tr>
                        </tbody>
                    </table>
                </section>
            </div>
        </main>
    </div>

    <!-- JavaScript -->
    <script src="script.js"></script>
</body>
</html>
