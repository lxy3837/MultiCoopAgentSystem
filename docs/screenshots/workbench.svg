  <text x="234" y="532" fill="#8b949e" font-size="9" font-family="monospace">$ [10:30:04] Skills loaded: 3 | MCP servers: 0</text>
  <text x="234" y="548" fill="#a371f7" font-size="9" font-family="monospace">$ [10:30:05] WebSocket server active</text>

