  <text x="524" y="128" fill="#a371f7" font-size="28" font-weight="700">3</text>
  <text x="612" y="128" fill="#8b949e" font-size="12">/ 已匹配</text>

  <rect x="746" y="68" width="234" height="80" rx="12" fill="#161b22" stroke="#21262d" filter="url(#shadow)"/>
  <text x="766" y="92" fill="#8b949e" font-size="10">LLM 状态</text>
  <text x="766" y="128" fill="#3fb950" font-size="28" font-weight="700">已接入</text>
  <text x="856" y="128" fill="#8b949e" font-size="12">DeepSeek-V3.2</text>

  <!-- Main Grid -->
  <rect x="20" y="164" width="480" height="190" rx="12" fill="#161b22" stroke="#21262d" filter="url(#shadow)"/>
  <text x="40" y="192" fill="#e6edf3" font-size="13" font-weight="600">🐙 Agent 状态面板</text>

  <!-- Agent rows -->
  <rect x="36" y="208" width="448" height="36" rx="6" fill="rgba(163,113,247,0.06)" stroke="rgba(163,113,247,0.15)"/>
  <circle cx="56" cy="226" r="5" fill="#3fb950"/><text x="70" y="230" fill="#e6edf3" font-size="11">coordinator_001</text>
  <text x="240" y="230" fill="#8b949e" font-size="10">协调型</text>
  <rect x="320" y="218" width="60" height="16" rx="4" fill="rgba(63,185,80,0.15)"/>
  <text x="350" y="231" text-anchor="middle" fill="#3fb950" font-size="9">online</text>
  <text x="420" y="230" fill="#8b949e" font-size="10">workflow-orchestration</text>

