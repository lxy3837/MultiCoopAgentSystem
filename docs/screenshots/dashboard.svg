<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="'Inter','Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.04)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.01)"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a371f7"/>
      <stop offset="100%" stop-color="#39d2c0"/>
    </linearGradient>
    <linearGradient id="greenGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(63,185,80,0.15)"/>
      <stop offset="100%" stop-color="rgba(63,185,80,0.02)"/>
    </linearGradient>
    <linearGradient id="cyanGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(57,210,192,0.12)"/>
      <stop offset="100%" stop-color="rgba(57,210,192,0.02)"/>
    </linearGradient>
    <linearGradient id="purpleGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(163,113,247,0.12)"/>
      <stop offset="100%" stop-color="rgba(163,113,247,0.02)"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="600" fill="url(#bgGrad)"/>

  <!-- Ambient orbs -->
  <circle cx="850" cy="0" r="250" fill="#a371f7" opacity="0.04"/>
  <circle cx="100" cy="500" r="200" fill="#39d2c0" opacity="0.04"/>
  <circle cx="500" cy="300" r="180" fill="#f59e0b" opacity="0.02"/>

  <!-- Header -->
  <rect x="0" y="0" width="1000" height="52" fill="rgba(22,27,34,0.95)" stroke="#30363d" stroke-width="0.5"/>
  <text x="24" y="33" fill="#e6edf3" font-size="15" font-weight="700">MCASys</text>
  <text x="94" y="33" fill="#8b949e" font-size="12">| 多Agent协作系统</text>
  <circle cx="260" cy="26" r="4" fill="#3fb950"/>
  <text x="272" y="32" fill="#8b949e" font-size="11">系统正常</text>
  <rect x="720" y="14" width="80" height="24" rx="5" fill="#21262d" stroke="#30363d"/>
  <text x="760" y="31" text-anchor="middle" fill="#8b949e" font-size="10">工作台</text>
  <rect x="810" y="14" width="60" height="24" rx="5" fill="#21262d" stroke="#30363d"/>
  <text x="840" y="31" text-anchor="middle" fill="#8b949e" font-size="10">配置</text>
  <rect x="880" y="14" width="60" height="24" rx="5" fill="#21262d" stroke="#30363d"/>
  <text x="910" y="31" text-anchor="middle" fill="#8b949e" font-size="10">API</text>
  <rect x="950" y="16" width="30" height="20" rx="10" fill="rgba(163,113,247,0.15)" stroke="rgba(163,113,247,0.3)"/>
  <text x="965" y="31" text-anchor="middle" fill="#a371f7" font-size="10">A</text>

  <!-- Stats Row -->
  <rect x="20" y="68" width="230" height="80" rx="12" fill="#161b22" stroke="#21262d" filter="url(#shadow)"/>
  <text x="40" y="92" fill="#8b949e" font-size="10">在线 Agent</text>
  <text x="40" y="128" fill="#3fb950" font-size="28" font-weight="700">4</text>
  <rect x="40" y="136" width="10" height="4" rx="2" fill="#3fb950" opacity="0.5"/>

  <rect x="262" y="68" width="230" height="80" rx="12" fill="#161b22" stroke="#21262d" filter="url(#shadow)"/>
  <text x="282" y="92" fill="#8b949e" font-size="10">今日任务</text>
  <text x="282" y="128" fill="#39d2c0" font-size="28" font-weight="700">12</text>
  <text x="378" y="128" fill="#8b949e" font-size="12">/ 完成 8</text>

  <rect x="504" y="68" width="230" height="80" rx="12" fill="#161b22" stroke="#21262d" filter="url(#shadow)"/>
