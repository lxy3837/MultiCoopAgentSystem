  <rect x="320" y="262" width="60" height="16" rx="4" fill="rgba(63,185,80,0.15)"/>
  <text x="350" y="275" text-anchor="middle" fill="#3fb950" font-size="9">online</text>
  <text x="420" y="274" fill="#8b949e" font-size="10">idle</text>

  <rect x="36" y="296" width="448" height="36" rx="6" fill="rgba(245,158,11,0.04)" stroke="rgba(245,158,11,0.1)"/>
  <circle cx="56" cy="314" r="5" fill="#3fb950"/><text x="70" y="318" fill="#e6edf3" font-size="11">executor_002</text>
  <text x="240" y="318" fill="#8b949e" font-size="10">执行型</text>
  <rect x="320" y="306" width="60" height="16" rx="4" fill="rgba(63,185,80,0.15)"/>
  <text x="350" y="319" text-anchor="middle" fill="#3fb950" font-size="9">online</text>
  <text x="420" y="318" fill="#8b949e" font-size="10">idle</text>

  <rect x="512" y="164" width="468" height="190" rx="12" fill="#161b22" stroke="#21262d" filter="url(#shadow)"/>
  <text x="532" y="192" fill="#e6edf3" font-size="13" font-weight="600">📈 近期任务</text>

  <rect x="528" y="208" width="436" height="30" rx="4" fill="rgba(63,185,80,0.05)"/>
  <text x="544" y="228" fill="#3fb950" font-size="10" font-weight="600">✓ 数据分析任务</text>
  <text x="750" y="228" fill="#3fb950" font-size="10">completed</text>
  <text x="900" y="228" fill="#8b949e" font-size="9">2min ago</text>

  <rect x="528" y="246" width="436" height="30" rx="4" fill="rgba(57,210,192,0.05)"/>
  <text x="544" y="266" fill="#39d2c0" font-size="10" font-weight="600">○ 代码审查任务</text>
  <text x="750" y="266" fill="#39d2c0" font-size="10">running</text>
  <text x="900" y="266" fill="#8b949e" font-size="9">just now</text>

  <rect x="528" y="284" width="436" height="30" rx="4" fill="rgba(248,81,73,0.05)"/>
  <text x="544" y="304" fill="#f85149" font-size="10" font-weight="600">✗ 模型训练任务</text>
  <text x="750" y="304" fill="#f85149" font-size="10">failed</text>
  <text x="900" y="304" fill="#8b949e" font-size="9">5min ago</text>

  <rect x="528" y="322" width="436" height="24" rx="4" fill="rgba(139,148,158,0.03)"/>
  <text x="544" y="339" fill="#8b949e" font-size="10">- 文档生成任务</text>
  <text x="750" y="339" fill="#8b949e" font-size="10">pending</text>
  <text x="900" y="339" fill="#8b949e" font-size="9">10min ago</text>

  <!-- Bottom Row -->
  <rect x="20" y="370" width="480" height="100" rx="12" fill="#161b22" stroke="#21262d" filter="url(#shadow)"/>
  <text x="40" y="398" fill="#e6edf3" font-size="13" font-weight="600">🔌 WebSocket 事件流</text>
  <text x="40" y="422" fill="#8b949e" font-size="10">ws://localhost:8000/ws/events</text>
  <rect x="40" y="434" width="440" height="2" rx="1" fill="#21262d"/>
  <text x="40" y="455" fill="#39d2c0" font-size="9" font-family="monospace">{"type":"agent_heartbeat","agent":"coordinator_001","ts":"10:30:01"}</text>

  <rect x="512" y="370" width="468" height="100" rx="12" fill="#161b22" stroke="#21262d" filter="url(#shadow)"/>
  <text x="532" y="398" fill="#e6edf3" font-size="13" font-weight="600">🧠 LLM 模型信息</text>
  <text x="532" y="420" fill="#8b949e" font-size="11">模型: deepseek-ai/DeepSeek-V3.2</text>
  <text x="532" y="440" fill="#8b949e" font-size="11">API: https://api.siliconflow.cn/v1</text>
  <text x="532" y="460" fill="#8b949e" font-size="11">状态: <tspan fill="#3fb950">已连接</tspan></text>

  <!-- Bottom Bar -->
  <rect x="20" y="486" width="960" height="36" rx="8" fill="rgba(255,255,255,0.02)" stroke="#21262d"/>
  <text x="40" y="510" fill="#8b949e" font-size="10">© 2026 MCASys v2.1</text>
  <text x="420" y="510" fill="#8b949e" font-size="10">API: http://localhost:8000/docs</text>
  <circle cx="760" cy="504" r="4" fill="#3fb950"/>
  <text x="772" y="510" fill="#3fb950" font-size="10">WebSocket Connected</text>
  <text x="920" y="510" fill="#8b949e" font-size="10">MIT License</text>
</svg>
